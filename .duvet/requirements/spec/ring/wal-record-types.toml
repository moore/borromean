[[spec]]
level = "MUST"
quote = '''
`RING-WAL-LAYOUT-005` Record types whose payload is empty
(`new_collection`, `drop_collection`, and `wal_recovery`) MUST still
encode `payload_len = 0`.
'''

[[spec]]
level = "MAY"
quote = '''
`RING-WAL-VALID-022` Replay MAY recover only from checksum-invalid or torn aligned WAL
slots.
'''

[[spec]]
level = "MUST"
quote = '''
`RING-WAL-VALID-026` `reclaim_begin(region_index)` and `reclaim_end(region_index)` MUST appear
in WAL order and are matched by `region_index`.
'''

[[spec]]
level = "MUST"
quote = '''
`RING-CHECKSUM-005` An implementation MUST ensure that even intentionally corrupted
storage eventually produces a reported error rather than memory
unsafety, undefined behavior, control-flow corruption, infinite loops,
or unbounded resource consumption amounting to denial of service.
'''

[[spec]]
level = "MUST"
quote = '''
All
replay walks, decoders, and collection-format handlers MUST remain
bounded by configured storage geometry and record sizes.
'''

[[spec]]
level = "MUST"
quote = '''
`RING-REPLAY-ASSUME-001` A WAL region MUST be erased before reuse.
'''

[[spec]]
level = "MUST"
quote = '''
`RING-REPLAY-ASSUME-004` Any operation that consumes a free-list head MUST first make the
allocator advance durable with `alloc_begin(region_index,
free_list_head_after)`.
'''

