[geometry]
# Supported region sizes: 4096, 8192, 16384, 65536, 1048576.
# Supported region counts: 64, 256, 1024, 1599, 4096.
# 64 regions at 1 MiB keeps the file around 65 MiB while using
# more realistic LSM segment sizing for desktop/server comparisons.
region_size = 1048576
region_count = 64

[comparison]
engines = ["borromean", "borromean-memory", "redb", "fjall"]

[backing]
path = "target/perf/file_backing.db"
allocation_policy = "fallback-on-unsupported"
madvise_policy = "normal"
erased_byte = 0xff
sync_on_create = false
remove_existing = true
remove_after = false

[redb]
path = "target/perf/redb.db"
remove_existing = true
remove_after = false
compact_interval = 0
compact_after_workload = false
durability = "immediate"

[fjall]
path = "target/perf/fjall.db"
remove_existing = true
remove_after = false
cache_size_bytes = 0
persist_mode = "sync-data"
manual_journal_persist = true
worker_threads = 1

[preload]
count = 0

[storage]
min_free_regions = 2
wal_write_granule = 8
wal_record_magic = 0xa5

[workload]
map_count = 1
operation_count = 3000
warmup_count = 0
key_space = 100000
seed = 0x123456789abcdef
read_ratio = 0
set_ratio = 100
delete_ratio = 0
value_size_bytes = 64
key_mode = "insert-range"
compact_on_signal = true
compaction_region_target = 16

[maintenance]
optimize_after_workload = false

[output]
json_path = "target/perf/file_backing.json"
latency_sample_interval = 250
progress_interval = 250
