[geometry]
region_size = 4096
region_count = 4096

[comparison]
engines = ["borromean", "borromean-memory", "redb"]

[backing]
path = "target/perf/file_backing_update_hot.db"
allocation_policy = "fallback-on-unsupported"
madvise_policy = "normal"
erased_byte = 0xff
sync_on_create = false
remove_existing = true
remove_after = false

[redb]
path = "target/perf/redb_update_hot.db"
remove_existing = true
remove_after = false
compact_interval = 0
compact_after_workload = false
durability = "immediate"

[preload]
count = 1000

[storage]
min_free_regions = 2
wal_write_granule = 8
wal_record_magic = 0xa5

[workload]
map_count = 1
operation_count = 10000
warmup_count = 0
key_space = 1000
seed = 0x123456789abcdef
read_ratio = 0
set_ratio = 100
delete_ratio = 0
value_size_bytes = 64
key_mode = "preloaded"
compact_on_signal = true
compaction_region_target = 64

[maintenance]
optimize_after_workload = false

[output]
json_path = "target/perf/file_backing_update_hot.json"
latency_sample_interval = 250
progress_interval = 500
