test_workspace = false
timeout_multiplier = 2.0
minimum_test_timeout = 5.0
output = ".mutants.out"
examine_globs = [
    "src/**/*.rs",
]
exclude_globs = [
    # The default cargo-mutants run uses default features, so feature-gated
    # backends are covered by their own configs instead of counted here.
    "src/embedded_storage.rs",
    "src/file_backing.rs",
    "src/perf_metrics.rs",

    # The perf driver is operational tooling, not product behavior covered by
    # the default library test suite.
    "src/bin/file_backing_perf.rs",
]
exclude_re = [
    # Perf-counter branches are compiled only by the `perf-counters` feature.
    # Cover them with focused `--features perf-counters` mutation runs instead
    # of counting them as default-feature misses.
    "perf_metrics|_metered|StoragePerf",

    # Backend error conversions are compiled only by their backend features.
    # Cover them with the embedded-storage and file-backing mutation configs.
    "embedded_storage::EmbeddedStorage|file_backing::FileBacking",
    "test_file_backing_scratch",

    # Equivalent through the public open path: startup and map opening still validate
    # live retained collection state before `Storage::open` can succeed.
    "validate_live_collections -> Result<\\(\\), StorageOpenError> with Ok\\(\\(\\)\\)",
]
